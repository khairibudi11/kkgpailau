<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Dokumentasi KKG PAI Kec. LAU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@300;400;600;800&display=swap');
        
        :root {
            --primary: #059669;
            --secondary: #10b981;
            --accent: #f59e0b;
        }

        body {
            font-family: 'Bricolage Grotesque', sans-serif;
            background-color: #f8fafc;
            min-height: 100vh;
        }

        .islamic-pattern {
            background-color: #059669;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l15 30-15 30L15 30z' fill='%23065f46' fill-opacity='0.2'/%3E%3C/svg%3E");
        }

        .premium-card {
            background: white;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .premium-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1);
        }

        .btn-emerald {
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
        }

        .loading-ring {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(5, 150, 105, 0.1);
            border-radius: 50%;
            border-top-color: #059669;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-900">

    <div id="app" class="max-w-6xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="relative overflow-hidden rounded-3xl islamic-pattern p-10 mb-10 text-white shadow-xl">
            <div class="relative z-10 flex flex-col md:flex-row md:items-center justify-between gap-6">
                <div>
                    <span class="bg-white/20 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider">Kecamatan LAU</span>
                    <h1 class="text-4xl font-extrabold mt-2 text-white">E-Dokumentasi KKG PAI</h1>
                    <p class="text-emerald-50/80">Sistem Arsip Digital Guru Pendidikan Agama Islam</p>
                </div>
                <button id="uploadBtn" class="bg-amber-400 hover:bg-amber-500 text-amber-950 px-8 py-4 rounded-2xl font-bold transition-all shadow-lg flex items-center gap-3">
                    <i data-lucide="plus-circle"></i> Tambah Arsip Baru
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <!-- Sidebar -->
            <aside class="space-y-4">
                <div class="premium-card p-6 rounded-3xl">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Filter Periode</h3>
                    <div class="space-y-4">
                        <select id="yearFilter" class="w-full bg-slate-50 border rounded-xl px-4 py-3 font-semibold focus:ring-2 focus:ring-emerald-500 outline-none">
                            <option value="2024">2024</option>
                            <option value="2025">2025</option>
                            <option value="2026" selected>2026</option>
                        </select>
                        <select id="monthFilter" class="w-full bg-slate-50 border rounded-xl px-4 py-3 font-semibold focus:ring-2 focus:ring-emerald-500 outline-none">
                            <option value="01">Januari</option><option value="02">Februari</option><option value="03" selected>Maret</option>
                            <option value="04">April</option><option value="05">Mei</option><option value="06">Juni</option>
                            <option value="07">Juli</option><option value="08">Agustus</option><option value="09">September</option>
                            <option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
                        </select>
                    </div>
                </div>
                <div class="premium-card p-6 rounded-3xl bg-emerald-50 border-emerald-100">
                    <p class="text-[10px] font-bold text-emerald-600 uppercase">Status Panel</p>
                    <p id="statsInfo" class="text-sm font-bold text-emerald-900 italic">Memuat Data...</p>
                </div>
            </aside>

            <!-- Main -->
            <section class="lg:col-span-3">
                <div id="fileContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="col-span-full py-20 text-center">
                        <div class="loading-ring"></div>
                        <p class="mt-4 text-slate-400">Menghubungkan ke database Firebase...</p>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- Modal Upload -->
    <div id="uploadModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-lg shadow-2xl overflow-hidden p-6">
             <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold">Simpan Berkas Baru</h3>
                <button id="closeModal" class="text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button>
            </div>
            <form id="uploadForm" class="space-y-4">
                <input type="text" id="fileTitle" placeholder="Judul Kegiatan" required class="w-full px-4 py-3 rounded-xl border outline-none focus:ring-2 focus:ring-emerald-500">
                <select id="fileCategory" class="w-full px-4 py-3 rounded-xl border">
                    <option value="Undangan">Undangan</option>
                    <option value="Notulen">Notulen</option>
                    <option value="Daftar Hadir">Daftar Hadir</option>
                    <option value="Dokumentasi">Dokumentasi</option>
                </select>
                <div class="p-6 border-2 border-dashed rounded-2xl bg-slate-50 text-center">
                    <input type="file" id="fileInput" class="hidden">
                    <button type="button" onclick="document.getElementById('fileInput').click()" class="flex flex-col items-center gap-2 mx-auto text-emerald-600">
                        <i data-lucide="file-up" class="w-8 h-8"></i>
                        <span class="text-sm font-bold">Pilih File PDF atau Gambar</span>
                    </button>
                    <p id="fileNameDisplay" class="text-[10px] text-slate-400 mt-2 italic">Belum ada file dipilih</p>
                </div>
                <button type="submit" id="submitBtn" class="w-full btn-emerald text-white py-4 rounded-xl font-bold shadow-lg hover:opacity-90 transition-opacity">Mulai Upload Sekarang</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

        // CONFIG OTOMATIS DARI SCREENSHOT ANDA
        const firebaseConfig = {
            apiKey: "AIzaSyDy6_e0g_zOXBtQ6ll6z1z6Zlh4raRJ9-w",
            authDomain: "kkg-pai-lau.firebaseapp.com",
            projectId: "kkg-pai-lau",
            storageBucket: "kkg-pai-lau.firebasestorage.app",
            messagingSenderId: "332195384967",
            appId: "1:332195384967:web:2e239a77f34f5a84dab222"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const appId = "kkg-pai-lau-prod";

        // Login & Data Listener
        signInAnonymously(auth).then(() => {
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'files');
            onSnapshot(q, (snapshot) => {
                const files = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                render(files);
            }, (err) => {
                document.getElementById('fileContainer').innerHTML = `
                    <div class="col-span-full p-6 bg-red-50 text-red-600 rounded-2xl border border-red-100 text-sm">
                        <b>Izin Firebase Belum Aktif:</b> Buka tab 'Rules' di Firestore & Storage, lalu ubah 'false' menjadi 'true'.
                    </div>`;
            });
        });

        function render(data) {
            const y = document.getElementById('yearFilter').value;
            const m = document.getElementById('monthFilter').value;
            const filtered = data.filter(f => f.year === y && f.month === m);

            document.getElementById('statsInfo').innerText = `Total: ${filtered.length} Berkas`;
            const container = document.getElementById('fileContainer');
            
            if (filtered.length === 0) {
                container.innerHTML = `<div class="col-span-full py-10 text-center text-slate-400 italic">Data belum tersedia untuk periode ini.</div>`;
            } else {
                container.innerHTML = filtered.map(f => `
                    <div class="premium-card p-6 rounded-3xl flex flex-col justify-between border-l-4 border-l-emerald-500">
                        <div>
                            <span class="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-2 py-1 rounded uppercase">${f.category}</span>
                            <h4 class="font-bold text-lg mt-2 text-slate-800 leading-tight">${f.title}</h4>
                        </div>
                        <div class="flex justify-between items-center mt-6">
                            <button onclick="deleteMe('${f.id}')" class="text-red-400 text-xs hover:text-red-600 flex items-center gap-1">
                                <i data-lucide="trash-2" class="w-3 h-3"></i> Hapus
                            </button>
                            <a href="${f.url}" target="_blank" class="bg-slate-900 text-white px-5 py-2.5 rounded-xl text-xs font-bold hover:bg-emerald-600 transition-colors">Buka File</a>
                        </div>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        }

        // Action Handlers
        document.getElementById('uploadBtn').onclick = () => document.getElementById('uploadModal').classList.remove('hidden');
        document.getElementById('closeModal').onclick = () => document.getElementById('uploadModal').classList.add('hidden');
        document.getElementById('fileInput').onchange = (e) => {
            if(e.target.files[0]) document.getElementById('fileNameDisplay').innerText = e.target.files[0].name;
        };

        window.deleteMe = async (id) => {
            if(confirm("Hapus file ini secara permanen?")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'files', id));
            }
        };

        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const file = document.getElementById('fileInput').files[0];
            if(!file) return alert("Pilih file dulu!");

            btn.disabled = true; btn.innerText = "Mengunggah...";
            try {
                const sRef = ref(storage, `kkg/${Date.now()}_${file.name}`);
                await uploadBytes(sRef, file);
                const url = await getDownloadURL(sRef);
                
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'files'), {
                    title: document.getElementById('fileTitle').value,
                    category: document.getElementById('fileCategory').value,
                    year: document.getElementById('yearFilter').value,
                    month: document.getElementById('monthFilter').value,
                    url, createdAt: Date.now()
                });
                
                document.getElementById('uploadModal').classList.add('hidden');
                document.getElementById('uploadForm').reset();
                document.getElementById('fileNameDisplay').innerText = "Belum ada file dipilih";
            } catch(err) { 
                alert("Gagal mengunggah! Pastikan Rules Firebase Storage sudah Aktif."); 
                console.error(err);
            }
            btn.disabled = false; btn.innerText = "Mulai Upload Sekarang";
        };

        document.getElementById('yearFilter').onchange = () => location.reload();
        document.getElementById('monthFilter').onchange = () => location.reload();
        lucide.createIcons();
    </script>
</body>
</html>
