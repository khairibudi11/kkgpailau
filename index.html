<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Archive KKG PAI LAU - Smart Upload</title>
    <link rel="icon" href="Logo.png" type="image/png">    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            color: #1e293b;
        }

        .hero-bg {
            background-image: linear-gradient(to bottom, rgba(15, 23, 42, 0.8), rgba(248, 250, 252, 1)), 
                              url('foto.jpeg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* Area Dropzone */
        #dropzone {
            transition: all 0.3s ease;
            border: 2px dashed #e2e8f0;
        }
        #dropzone.dragover {
            border-color: #10b981;
            background-color: #ecfdf5;
            transform: scale(1.02);
        }

        .btn-primary {
            background: linear-gradient(135deg, #059669 0%, #065f46 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(5, 150, 105, 0.4);
        }
    </style>
</head>
<body class="min-h-screen">

    <header class="hero-bg min-h-[50vh] flex flex-col items-center justify-center text-center px-6 py-20 relative">
        <div class="absolute top-6 right-6 flex items-center gap-3 bg-white/10 backdrop-blur-md p-2 pr-5 rounded-full border border-white/20">
            <img src="Logo.png" alt="Logo" class="w-10 h-10 rounded-full bg-white p-1">
            <div class="text-left text-white">
                <p class="text-[10px] font-black uppercase tracking-tighter">KKG PAI LAU</p>
                <p class="text-[10px] font-bold text-emerald-400">Arsip Digital</p>
            </div>
        </div>

        <h1 class="text-4xl md:text-6xl font-extrabold text-white mb-4">Direct <span class="text-emerald-400">Cloud</span> Upload</h1>
        <p class="text-slate-200 max-w-xl mx-auto mb-8 font-medium">Upload file langsung ke Google Drive melalui portal ini tanpa perlu copy-paste link manual.</p>
        
        <button id="openModalBtn" class="btn-primary text-white px-10 py-4 rounded-2xl font-bold flex items-center gap-3 mx-auto">
            <i data-lucide="upload-cloud"></i> Upload Berkas Baru
        </button>
    </header>

    <main class="max-w-7xl mx-auto px-6 -mt-10 pb-20">
        <div class="glass-panel p-6 rounded-3xl mb-10 flex flex-wrap gap-4 items-center justify-between">
            <div class="flex gap-4">
                <select id="yearFilter" class="bg-white border rounded-xl px-4 py-2 font-bold outline-none focus:ring-2 focus:ring-emerald-500">
                    <option value="2026">2026</option>
                    <option value="2025">2025</option>
                </select>
                <select id="monthFilter" class="bg-white border rounded-xl px-4 py-2 font-bold outline-none focus:ring-2 focus:ring-emerald-500">
                    <option value="Januari">Januari</option>
                    <option value="Februari">Februari</option>
                    <option value="Maret" selected>Maret</option>
                </select>
            </div>
            <div class="flex items-center gap-2 text-emerald-700 font-bold">
                <i data-lucide="database" class="w-5 h-5"></i>
                <span id="statsDisplay">0</span> File Tersimpan
            </div>
        </div>

        <div id="fileGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Data akan dimuat di sini -->
        </div>
    </main>

    <!-- Modal Form dengan Fitur File -->
    <div id="modalOverlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-xl shadow-2xl overflow-hidden animate-in zoom-in duration-300">
            <div class="px-10 py-6 bg-slate-50 border-b flex justify-between items-center">
                <h3 class="text-xl font-black">Upload ke Drive</h3>
                <button id="closeModalBtn" class="w-10 h-10 rounded-full hover:bg-slate-200 flex items-center justify-center">
                    <i data-lucide="x" class="text-slate-400"></i>
                </button>
            </div>

            <form id="uploadForm" class="p-8 space-y-6">
                <div id="dropzone" class="p-8 rounded-2xl flex flex-col items-center justify-center cursor-pointer">
                    <input type="file" id="inpFile" class="hidden" required>
                    <div id="fileInfo" class="text-center">
                        <i data-lucide="file-up" class="w-12 h-12 text-emerald-500 mx-auto mb-3"></i>
                        <p class="font-bold text-slate-700">Klik atau seret file ke sini</p>
                        <p class="text-xs text-slate-400 mt-1 uppercase font-bold tracking-widest">PDF, Gambar, atau Dokumen</p>
                    </div>
                </div>

                <div class="space-y-4">
                    <input type="text" id="inpTitle" placeholder="Nama Kegiatan / Berkas" required class="w-full px-5 py-3.5 rounded-xl bg-slate-100 outline-none focus:ring-2 focus:ring-emerald-500 font-bold">
                    
                    <div class="grid grid-cols-2 gap-4">
                        <select id="inpCategory" class="w-full px-5 py-3.5 rounded-xl bg-slate-100 font-bold outline-none">
                            <option value="Media Visual">Foto/Video</option>
                            <option value="Undangan">Undangan</option>
                            <option value="Notulen">Notulen</option>
                            <option value="Daftar Hadir">Daftar Hadir</option>
                        </select>
                        <select id="inpMonth" class="w-full px-5 py-3.5 rounded-xl bg-slate-100 font-bold outline-none">
                            <option value="Januari">Januari</option>
                            <option value="Maret" selected>Maret</option>
                        </select>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full btn-primary text-white py-4 rounded-xl font-black uppercase text-sm tracking-widest flex items-center justify-center gap-3">
                    <i data-lucide="cloud-lightning"></i> Mulai Upload
                </button>
            </form>
            
            <!-- Progress Loader (Hidden by default) -->
            <div id="uploadProgress" class="hidden p-12 text-center">
                <div class="w-16 h-16 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
                <p class="font-black text-slate-800">Sedang Mengunggah...</p>
                <p class="text-sm text-slate-500 mt-2">Jangan tutup jendela ini sampai selesai.</p>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwS7u-NN7pHiw8dNiwHPoOOoSeigw14orWvykdafswM9yI-n8QXJ6LaY7_4GoI-wC9g/exec"; // Ganti dengan URL script Anda
        
        // --- LOGIKA UI ---
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('inpFile');
        const fileInfo = document.getElementById('fileInfo');

        dropzone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            if(fileInput.files.length > 0) {
                const file = fileInput.files[0];
                fileInfo.innerHTML = `
                    <i data-lucide="file-check" class="w-12 h-12 text-emerald-600 mx-auto mb-2"></i>
                    <p class="font-black text-emerald-700">${file.name}</p>
                    <p class="text-xs text-slate-400">${(file.size / 1024 / 1024).toFixed(2)} MB</p>
                `;
                lucide.createIcons();
                document.getElementById('inpTitle').value = file.name.split('.')[0];
            }
        }

        // --- LOGIKA UPLOAD (DENGAN CONVERT BASE64) ---
        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const file = fileInput.files[0];
            const reader = new FileReader();

            // Sembunyikan form, tampilkan loader
            document.getElementById('uploadForm').classList.add('hidden');
            document.getElementById('uploadProgress').classList.remove('hidden');

            reader.onload = async function() {
                const base64Data = reader.result.split(',')[1];
                
                const payload = {
                    filename: file.name,
                    mimeType: file.type,
                    fileData: base64Data, // Data file dikirim ke sini
                    title: document.getElementById('inpTitle').value,
                    category: document.getElementById('inpCategory').value,
                    month: document.getElementById('inpMonth').value,
                    year: document.getElementById('yearFilter').value
                };

                try {
                    // Gunakan fetch POST ke Google Apps Script
                    const response = await fetch(GAS_URL, {
                        method: "POST",
                        body: JSON.stringify(payload)
                    });
                    
                    const result = await response.json();
                    if(result.status === "success") {
                        alert("Berhasil Terupload ke Drive!");
                        location.reload();
                    }
                } catch (error) {
                    console.error(error);
                    alert("Upload gagal (Cek koneksi atau izin Script)");
                    document.getElementById('uploadForm').classList.remove('hidden');
                    document.getElementById('uploadProgress').classList.add('hidden');
                }
            };
            
            reader.readAsDataURL(file);
        };

        // Modal Controls
        document.getElementById('openModalBtn').onclick = () => document.getElementById('modalOverlay').classList.remove('hidden');
        document.getElementById('closeModalBtn').onclick = () => document.getElementById('modalOverlay').classList.add('hidden');

        lucide.createIcons();
    </script>
</body>
</html>
