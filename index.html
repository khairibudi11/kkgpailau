<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Dokumentasi KKG PAI Kec. LAU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@300;400;600;800&display=swap');
        body { font-family: 'Bricolage Grotesque', sans-serif; background-color: #f8fafc; }
        .islamic-pattern {
            background-color: #059669;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l15 30-15 30L15 30z' fill='%23065f46' fill-opacity='0.2'/%3E%3C/svg%3E");
        }
        .premium-card { background: white; border: 1px solid #e2e8f0; transition: all 0.3s ease; }
        .btn-emerald { background: linear-gradient(135deg, #059669 0%, #10b981 100%); }
        .loading-spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-900">

    <div id="app" class="max-w-6xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="relative overflow-hidden rounded-3xl islamic-pattern p-10 mb-10 text-white shadow-xl text-center md:text-left">
            <div class="relative z-10 flex flex-col md:flex-row md:items-center justify-between gap-6">
                <div>
                    <span class="bg-white/20 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider">Kecamatan LAU</span>
                    <h1 class="text-4xl font-extrabold mt-2 text-white">E-Dokumentasi KKG PAI</h1>
                    <p class="text-emerald-50/80">Sistem Arsip Digital Berbasis Google Drive</p>
                </div>
                <button id="uploadBtn" class="bg-amber-400 hover:bg-amber-500 text-amber-950 px-8 py-4 rounded-2xl font-bold shadow-lg flex items-center justify-center gap-3">
                    <i data-lucide="plus-circle"></i> Tambah Arsip Baru
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <!-- Sidebar -->
            <aside class="space-y-4">
                <div class="premium-card p-6 rounded-3xl shadow-sm border-t-4 border-emerald-500">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Filter Periode</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Pilih Tahun</label>
                            <select id="yearFilter" class="w-full bg-slate-50 border rounded-xl px-4 py-3 font-semibold outline-none focus:ring-2 focus:ring-emerald-500">
                                <option value="2026">2026</option>
                                <option value="2027">2027</option>
                                <option value="2028">2028</option>
                                <option value="2029">2029</option>
                                <option value="2030">2030</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Pilih Bulan</label>
                            <select id="monthFilter" class="w-full bg-slate-50 border rounded-xl px-4 py-3 font-semibold outline-none focus:ring-2 focus:ring-emerald-500">
                                <option value="Januari">Januari</option><option value="Februari">Februari</option><option value="Maret" selected>Maret</option>
                                <option value="April">April</option><option value="Mei">Mei</option><option value="Juni">Juni</option>
                                <option value="Juli">Juli</option><option value="Agustus">Agustus</option><option value="September">September</option>
                                <option value="Oktober">Oktober</option><option value="November">November</option><option value="Desember">Desember</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="premium-card p-6 rounded-3xl bg-emerald-50 border-emerald-100 shadow-sm text-center">
                    <p class="text-[10px] font-bold text-emerald-600 uppercase">Status Sistem</p>
                    <p id="statsInfo" class="text-sm font-bold text-emerald-900 italic">Memulai...</p>
                </div>
            </aside>

            <!-- Main Content -->
            <section class="lg:col-span-3">
                <div id="fileContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="col-span-full py-20 text-center text-slate-400">
                        <i data-lucide="loader-2" class="w-10 h-10 mx-auto loading-spinner mb-4 text-emerald-500"></i>
                        <p>Menghubungkan ke Database...</p>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- Modal Form -->
    <div id="uploadModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-lg shadow-2xl overflow-hidden p-8">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-slate-800">Input Data Arsip</h3>
                <button id="closeModal" class="text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button>
            </div>
            <form id="uploadForm" class="space-y-5">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">Nama/Judul Kegiatan</label>
                    <input type="text" id="fileTitle" placeholder="Misal: Rapat Program Ramadhan" required class="w-full mt-1 px-4 py-3 rounded-xl border focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase ml-1">Tahun Arsip</label>
                        <select id="formYear" class="w-full mt-1 px-4 py-3 rounded-xl border outline-none bg-slate-50">
                            <option value="2026">2026</option><option value="2027">2027</option>
                            <option value="2028">2028</option><option value="2029">2029</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase ml-1">Bulan Arsip</label>
                        <select id="formMonth" class="w-full mt-1 px-4 py-3 rounded-xl border outline-none bg-slate-50">
                            <option value="Januari">Januari</option><option value="Februari">Februari</option><option value="Maret">Maret</option>
                            <option value="April">April</option><option value="Mei">Mei</option><option value="Juni">Juni</option>
                            <option value="Juli">Juli</option><option value="Agustus">Agustus</option><option value="September">September</option>
                            <option value="Oktober">Oktober</option><option value="November">November</option><option value="Desember">Desember</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">Kategori Berkas</label>
                    <select id="fileCategory" class="w-full mt-1 px-4 py-3 rounded-xl border outline-none bg-slate-50">
                        <option value="Undangan">Undangan</option>
                        <option value="Notulen">Notulen</option>
                        <option value="Daftar Hadir">Daftar Hadir</option>
                        <option value="Foto/Video">Dokumentasi Visual</option>
                    </select>
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">Link Share Google Drive</label>
                    <input type="url" id="fileUrl" placeholder="https://drive.google.com/..." required class="w-full mt-1 px-4 py-3 rounded-xl border focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>

                <button type="submit" id="submitBtn" class="w-full btn-emerald text-white py-4 rounded-xl font-bold shadow-lg hover:opacity-90 transition-all flex items-center justify-center gap-2">
                    Simpan ke Cloud Database
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDy6_e0g_zOXBtQ6ll6z1z6Zlh4raRJ9-w",
            authDomain: "kkg-pai-lau.firebaseapp.com",
            projectId: "kkg-pai-lau",
            storageBucket: "kkg-pai-lau.firebasestorage.app",
            messagingSenderId: "332195384967",
            appId: "1:332195384967:web:2e239a77f34f5a84dab222"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const colPath = "kkg_paila_files"; // Path koleksi lebih sederhana

        let allFiles = [];

        function render() {
            const y = document.getElementById('yearFilter').value;
            const m = document.getElementById('monthFilter').value;
            
            // Logika filter yang sangat ketat
            const filtered = allFiles.filter(f => f.year === y && f.month === m);

            document.getElementById('statsInfo').innerText = `Ditemukan: ${filtered.length} Berkas`;
            const container = document.getElementById('fileContainer');
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-20 text-center text-slate-400 bg-white rounded-3xl border border-dashed border-slate-200">
                        <i data-lucide="file-x" class="w-12 h-12 mx-auto mb-4 opacity-10"></i>
                        <p class="font-medium">Tidak ada data untuk periode<br><span class="text-slate-600">${m} ${y}</span></p>
                    </div>`;
            } else {
                container.innerHTML = filtered.map(f => `
                    <div class="premium-card p-6 rounded-3xl flex flex-col justify-between border-l-4 border-emerald-500 shadow-sm hover:shadow-md transition-all">
                        <div>
                            <div class="flex justify-between items-start">
                                <span class="text-[10px] font-bold text-emerald-600 bg-emerald-100 px-2.5 py-1 rounded-lg uppercase tracking-wider">${f.category}</span>
                                <p class="text-[10px] text-slate-400">${f.year}</p>
                            </div>
                            <h4 class="font-bold text-lg mt-3 text-slate-800 leading-tight">${f.title}</h4>
                        </div>
                        <div class="flex justify-between items-center mt-8 border-t border-slate-50 pt-4">
                            <button onclick="window.deleteMe('${f.id}')" class="text-red-400 text-xs hover:text-red-600 flex items-center gap-1.5 transition-colors">
                                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i> Hapus
                            </button>
                            <a href="${f.url}" target="_blank" class="bg-slate-900 text-white px-5 py-2.5 rounded-xl text-xs font-bold hover:bg-emerald-600 transition-all flex items-center gap-2">
                                <i data-lucide="external-link" class="w-3.5 h-3.5"></i> Buka Drive
                            </a>
                        </div>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        }

        // Monitoring Autentikasi dan Data Real-time
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('statsInfo').innerText = "Tersambung";
                const q = query(collection(db, colPath), orderBy("createdAt", "desc"));
                
                onSnapshot(q, (snapshot) => {
                    allFiles = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    render();
                }, (error) => {
                    console.error("Firebase Error:", error.message);
                    document.getElementById('statsInfo').innerText = "Gagal Akses Data";
                });
            } else {
                signInAnonymously(auth).catch(e => console.error("Auth Error:", e.message));
            }
        });

        // UI Handlers
        document.getElementById('uploadBtn').onclick = () => {
            // Sinkronkan modal dengan filter saat ini
            document.getElementById('formYear').value = document.getElementById('yearFilter').value;
            document.getElementById('formMonth').value = document.getElementById('monthFilter').value;
            document.getElementById('uploadModal').classList.remove('hidden');
        };

        document.getElementById('closeModal').onclick = () => document.getElementById('uploadModal').classList.add('hidden');
        document.getElementById('yearFilter').onchange = render;
        document.getElementById('monthFilter').onchange = render;

        // Global Delete
        window.deleteMe = async (id) => {
            if(confirm("Hapus berkas ini secara permanen dari database?")) {
                try {
                    await deleteDoc(doc(db, colPath, id));
                } catch(e) { alert("Gagal menghapus: " + e.message); }
            }
        };

        // Form Submission
        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 loading-spinner"></i> Menyimpan...`;
            lucide.createIcons();

            try {
                const data = {
                    title: document.getElementById('fileTitle').value,
                    category: document.getElementById('fileCategory').value,
                    year: document.getElementById('formYear').value,
                    month: document.getElementById('formMonth').value,
                    url: document.getElementById('fileUrl').value,
                    createdAt: serverTimestamp()
                };

                await addDoc(collection(db, colPath), data);
                
                document.getElementById('uploadModal').classList.add('hidden');
                document.getElementById('uploadForm').reset();
            } catch(e) {
                console.error("Error Simpan:", e.message);
                alert("Gagal menyimpan! Pastikan Rules Firebase sudah PUBLISH dan Anonymous Auth sudah ENABLE.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
                lucide.createIcons();
            }
        };

        lucide.createIcons();
    </script>
</body>
</html>
