<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Dokumentasi KKG PAI Kec. LAU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .islamic-bg {
            background-color: #059669;
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 0l20 40-20 40-20-40z' fill='%23047857' fill-opacity='0.1'/%3E%3C/svg%3E");
        }
        .file-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .file-card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1); }
        .loading-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-slate-900 leading-relaxed">

    <div id="app" class="max-w-6xl mx-auto px-4 py-8 md:py-12">
        <!-- Header -->
        <header class="relative overflow-hidden rounded-[2.5rem] islamic-bg p-8 md:p-14 mb-10 text-white shadow-2xl">
            <div class="relative z-10 flex flex-col md:flex-row justify-between items-center gap-8">
                <div class="text-center md:text-left">
                    <div class="inline-flex items-center gap-2 bg-white/20 px-4 py-1.5 rounded-full text-[11px] font-extrabold uppercase tracking-widest mb-4">
                        <i data-lucide="award" class="w-4 h-4"></i> Portal Resmi (GAS)
                    </div>
                    <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight">E-Dokumentasi</h1>
                    <p class="text-emerald-50/80 text-lg md:text-xl mt-3 font-medium">KKG PAI Kecamatan Lau, Maros</p>
                </div>
                <button id="openModalBtn" class="bg-amber-400 hover:bg-amber-500 text-amber-950 px-8 py-5 rounded-2xl font-black shadow-xl flex items-center gap-3 transition-all hover:scale-105 active:scale-95 group">
                    <i data-lucide="plus-circle" class="group-hover:rotate-90 transition-transform"></i>
                    TAMBAH ARSIP BARU
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Sidebar -->
            <aside class="lg:col-span-3 space-y-6">
                <div class="glass p-8 rounded-[2rem] shadow-sm border border-slate-200">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-6">Filter Arsip</h3>
                    <div class="space-y-6">
                        <div>
                            <label class="text-[11px] font-bold text-slate-500 uppercase ml-1 mb-2 block">Tahun Kegiatan</label>
                            <select id="yearFilter" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5 font-bold text-slate-700 outline-none focus:ring-2 focus:ring-emerald-500 transition-all appearance-none cursor-pointer">
                                <option value="2024">2024</option>
                                <option value="2025">2025</option>
                                <option value="2026" selected>2026</option>
                                <option value="2027">2027</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[11px] font-bold text-slate-500 uppercase ml-1 mb-2 block">Bulan Kegiatan</label>
                            <select id="monthFilter" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5 font-bold text-slate-700 outline-none focus:ring-2 focus:ring-emerald-500 transition-all appearance-none cursor-pointer">
                                <option value="Januari">Januari</option>
                                <option value="Februari">Februari</option>
                                <option value="Maret" selected>Maret</option>
                                <option value="April">April</option>
                                <option value="Mei">Mei</option>
                                <option value="Juni">Juni</option>
                                <option value="Juli">Juli</option>
                                <option value="Agustus">Agustus</option>
                                <option value="September">September</option>
                                <option value="Oktober">Oktober</option>
                                <option value="November">November</option>
                                <option value="Desember">Desember</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="bg-emerald-600 p-8 rounded-[2rem] text-white shadow-lg text-center relative overflow-hidden group">
                    <i data-lucide="database" class="absolute -right-4 -bottom-4 w-24 h-24 opacity-10 group-hover:scale-110 transition-transform"></i>
                    <p class="text-[10px] font-black uppercase tracking-widest opacity-70 mb-1">Status Google Sheets</p>
                    <p id="statsDisplay" class="text-2xl font-black italic">Memuat...</p>
                </div>
            </aside>

            <!-- Main File Grid -->
            <main class="lg:col-span-9">
                <div id="fileGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="col-span-full py-32 text-center text-slate-400">
                        <i data-lucide="refresh-cw" class="w-12 h-12 mx-auto mb-4 loading-spin text-emerald-500"></i>
                        <p class="font-medium tracking-wide">Mengkoneksikan ke Google Sheets...</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal Form -->
    <div id="modalOverlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-xl shadow-2xl overflow-hidden">
            <div class="px-10 py-8 bg-slate-50 border-b flex justify-between items-center">
                <div>
                    <h3 class="text-2xl font-extrabold text-slate-800">Unggah Arsip</h3>
                    <p class="text-sm text-slate-500 font-medium">Data akan disimpan ke Google Sheets</p>
                </div>
                <button id="closeModalBtn" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-200 transition-colors">
                    <i data-lucide="x" class="text-slate-400"></i>
                </button>
            </div>
            
            <form id="uploadForm" class="p-10 space-y-6">
                <div id="errorAlert" class="hidden p-4 bg-red-50 border border-red-200 text-red-600 rounded-xl text-xs font-bold mb-4"></div>

                <div>
                    <label class="text-[11px] font-black text-slate-500 uppercase ml-1 mb-2 block tracking-wider">Nama Kegiatan</label>
                    <input type="text" id="inpTitle" placeholder="Misal: Rapat Evaluasi Program Kerja" required class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none transition-all font-medium">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[11px] font-black text-slate-500 uppercase ml-1 mb-2 block tracking-wider">Kategori Berkas</label>
                        <select id="inpCategory" class="w-full px-5 py-4 rounded-2xl border border-slate-200 outline-none appearance-none bg-slate-50 cursor-pointer font-bold text-slate-700">
                            <option value="Administrasi">Administrasi</option>
                            <option value="Notulen">Notulen</option>
                            <option value="Daftar Hadir">Daftar Hadir</option>
                            <option value="Foto / Video">Foto / Video</option>
                            <option value="Perangkat Ajar">Perangkat Ajar</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[11px] font-black text-slate-500 uppercase ml-1 mb-2 block tracking-wider">Periode Bulan</label>
                        <select id="inpMonth" class="w-full px-5 py-4 rounded-2xl border border-slate-200 outline-none appearance-none bg-slate-50 cursor-pointer font-bold text-slate-700">
                            <option value="Januari">Januari</option><option value="Februari">Februari</option><option value="Maret">Maret</option>
                            <option value="April">April</option><option value="Mei">Mei</option><option value="Juni">Juni</option>
                            <option value="Juli">Juli</option><option value="Agustus">Agustus</option><option value="September">September</option>
                            <option value="Oktober">Oktober</option><option value="November">November</option><option value="Desember">Desember</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="text-[11px] font-black text-slate-500 uppercase ml-1 mb-2 block tracking-wider">Link Google Drive</label>
                    <div class="relative">
                        <i data-lucide="link" class="absolute left-5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input type="url" id="inpUrl" placeholder="https://drive.google.com/..." required class="w-full pl-12 pr-5 py-4 rounded-2xl border border-slate-200 focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none transition-all font-medium">
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-slate-900 hover:bg-emerald-600 text-white py-5 rounded-2xl font-bold text-lg shadow-xl transition-all flex items-center justify-center gap-3 active:scale-[0.98]">
                    <i data-lucide="save" class="w-5 h-5"></i> Simpan ke Google Sheets
                </button>
            </form>
        </div>
    </div>

    <script>
        // URL WEB APP DARI GOOGLE APPS SCRIPT ANDA
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwS7u-NN7pHiw8dNiwHPoOOoSeigw14orWvykdafswM9yI-n8QXJ6LaY7_4GoI-wC9g/exec";

        let archiveData = [];

        // Ambil Data
        async function loadData() {
            const stats = document.getElementById('statsDisplay');
            const grid = document.getElementById('fileGrid');
            
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                archiveData = data;
                renderGrid();
            } catch (err) {
                console.error("Gagal memuat data:", err);
                stats.innerText = "ERROR DB";
                grid.innerHTML = `<div class="col-span-full text-center py-20 text-red-500 font-bold">Gagal terhubung ke Google Sheets. Periksa URL script dan pastikan sudah di-deploy sebagai 'Anyone'.</div>`;
            }
        }

        // Tampilkan Data
        function renderGrid() {
            const y = document.getElementById('yearFilter').value;
            const m = document.getElementById('monthFilter').value;
            const stats = document.getElementById('statsDisplay');
            const grid = document.getElementById('fileGrid');

            // Filter (Sesuaikan key dengan header di spreadsheet yang dibuat lowercase oleh code.gs)
            const filtered = archiveData.filter(d => 
                String(d.tahun) === String(y) && 
                String(d.bulan) === String(m)
            );

            stats.innerText = `${filtered.length} Berkas`;

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-24 text-center bg-white/50 rounded-[2rem] border-2 border-dashed border-slate-200">
                        <i data-lucide="file-warning" class="w-16 h-16 mx-auto mb-4 text-slate-300"></i>
                        <p class="text-slate-500 font-extrabold text-xl">Arsip Belum Tersedia</p>
                        <p class="text-slate-400 text-sm mt-1 font-medium">Data untuk periode ${m} ${y} tidak ditemukan</p>
                    </div>`;
            } else {
                grid.innerHTML = filtered.map(f => `
                    <div class="file-card glass p-7 rounded-[2rem] flex flex-col justify-between border border-slate-200 group">
                        <div>
                            <span class="px-3 py-1 bg-emerald-100 text-emerald-800 text-[10px] font-black uppercase rounded-lg tracking-widest mb-4 inline-block">${f.kategori}</span>
                            <h4 class="text-xl font-extrabold text-slate-800 group-hover:text-emerald-700 transition-colors leading-tight">${f.namakegiatan}</h4>
                        </div>
                        <div class="mt-8">
                            <a href="${f.linkdrive}" target="_blank" class="w-full bg-slate-900 text-white px-6 py-4 rounded-xl font-bold text-xs flex items-center justify-center gap-2 hover:bg-emerald-600 transition-all shadow-lg active:scale-95">
                                <i data-lucide="external-link" class="w-4 h-4"></i> BUKA DOKUMEN
                            </a>
                        </div>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        }

        // Simpan Data
        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const alert = document.getElementById('errorAlert');
            
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 loading-spin"></i> MENYIMPAN...`;
            alert.classList.add('hidden');

            const payload = {
                title: document.getElementById('inpTitle').value,
                category: document.getElementById('inpCategory').value,
                year: document.getElementById('yearFilter').value,
                month: document.getElementById('inpMonth').value,
                url: document.getElementById('inpUrl').value
            };

            try {
                // Gunakan mode no-cors untuk menghindari isu preflight pada Apps Script
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    body: JSON.stringify(payload)
                });
                
                // Karena no-cors tidak bisa baca response, kita asumsikan sukses jika tidak ada error jaringan
                window.alert("Data sedang dikirim. Halaman akan diperbarui otomatis.");
                location.reload();
            } catch (err) {
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="save" class="w-5 h-5"></i> Simpan ke Google Sheets`;
                alert.innerText = "Gagal mengirim data. Cek koneksi internet.";
                alert.classList.remove('hidden');
            }
        };

        // UI Events
        document.getElementById('openModalBtn').onclick = () => {
            document.getElementById('inpMonth').value = document.getElementById('monthFilter').value;
            document.getElementById('modalOverlay').classList.remove('hidden');
        };
        document.getElementById('closeModalBtn').onclick = () => document.getElementById('modalOverlay').classList.add('hidden');
        document.getElementById('yearFilter').onchange = renderGrid;
        document.getElementById('monthFilter').onchange = renderGrid;

        // Init
        window.onload = loadData;
        lucide.createIcons();
    </script>
</body>
</html>
